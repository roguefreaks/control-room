name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install, not npm ci: the lockfile is generated on Windows and npm
      # omits Linux-only transitive optional deps (@emnapi/*) from it — a
      # long-standing npm platform bug that makes `npm ci` fail on Linux runners.
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
